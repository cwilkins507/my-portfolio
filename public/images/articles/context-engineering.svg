<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Four-layer context engineering stack for better AI coding sessions.">
  <style>
    :root { --accent: #818cf8; --muted: rgba(255,255,255,0.28); }
    svg { font-family: "DM Sans", Arial, sans-serif; }
  </style>
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#08111f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#08111f"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <path d="M0 540 C190 475 330 605 520 535 C720 460 850 520 1200 410 L1200 630 L0 630Z" fill="rgba(255,255,255,0.035)"/>
  <path d="M110 110 H1090 V520" fill="none" stroke="url(#edge)" stroke-width="2"/>
  <text x="110" y="86" fill="#818cf8" font-size="24" font-weight="700" letter-spacing="0">AI Agents in Practice</text>
  <text x="110" y="580" fill="rgba(255,255,255,0.82)" font-size="34" font-weight="700" letter-spacing="0">Context Engineering</text>
  <g transform="translate(245 192)">
        <rect x="0" y="0" width="710" height="58" rx="10" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6"/>
            <rect x="0" y="0" width="8" height="58" rx="4" fill="#64748b"/>
            <text x="26" y="26" fill="rgba(255,255,255,0.88)" font-size="20" font-weight="700" letter-spacing="0">Layer 4: Session Context</text>
            <text x="26" y="48" fill="rgba(255,255,255,0.46)" font-size="13" font-weight="600" letter-spacing="0">conversation history, open files</text><rect x="0" y="78" width="710" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="#2dd4bf" stroke-width="2" />
            <rect x="0" y="78" width="8" height="58" rx="4" fill="#2dd4bf"/>
            <text x="26" y="104" fill="rgba(255,255,255,0.88)" font-size="20" font-weight="700" letter-spacing="0">Layer 3: File-Level Docs</text>
            <text x="26" y="126" fill="rgba(255,255,255,0.46)" font-size="13" font-weight="600" letter-spacing="0">comments, names, types</text><rect x="0" y="156" width="710" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="#60a5fa" stroke-width="2" />
            <rect x="0" y="156" width="8" height="58" rx="4" fill="#60a5fa"/>
            <text x="26" y="182" fill="rgba(255,255,255,0.88)" font-size="20" font-weight="700" letter-spacing="0">Layer 2: Instruction Files</text>
            <text x="26" y="204" fill="rgba(255,255,255,0.46)" font-size="13" font-weight="600" letter-spacing="0">CLAUDE.md, rules, conventions</text><rect x="0" y="234" width="710" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="#818cf8" stroke-width="2" />
            <rect x="0" y="234" width="8" height="58" rx="4" fill="#818cf8"/>
            <text x="26" y="260" fill="rgba(255,255,255,0.88)" font-size="20" font-weight="700" letter-spacing="0">Layer 1: Project Structure</text>
            <text x="26" y="282" fill="rgba(255,255,255,0.46)" font-size="13" font-weight="600" letter-spacing="0">folders, boundaries, co-location</text>
        <line x1="750" y1="92" x2="750" y2="286" stroke="#98c379" stroke-width="5" stroke-linecap="round" opacity="0.78"/>
        <text x="780" y="195" fill="#98c379" font-size="16" font-weight="700" letter-spacing="0">persistent substrate</text>
        <text x="780" y="36" fill="#94a3b8" font-size="16" font-weight="700" letter-spacing="0">resets</text>
