<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="No-code CRM integration loop that normalizes a lead, upserts the CRM by email, triggers follow-up, and writes the CRM ID back.">
