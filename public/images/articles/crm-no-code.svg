        <rect x="300" y="226" width="375" height="64" rx="14" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="2"/>
        <text x="332" y="254" fill="#bfdbfe" font-size="20" font-weight="700" letter-spacing="0">Write CRM ID back</text>
        <text x="332" y="277" fill="#93c5fd" font-size="16" font-weight="700" letter-spacing="0">prevents duplicates and makes retries safe</text>
