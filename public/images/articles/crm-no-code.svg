  <text x="110" y="580" fill="rgba(255,255,255,0.82)" font-size="34" font-weight="700" letter-spacing="0">CRM Integration</text>
  <g transform="translate(105 184)">
        <rect x="0" y="76" width="170" height="76" rx="14" fill="rgba(255,255,255,0.06)" stroke="#94a3b8" stroke-width="2" opacity="0.95"/>
  <text x="20" y="110" fill="rgba(255,255,255,0.86)" font-size="19" font-weight="700" letter-spacing="0">Lead Form</text>
  <text x="20" y="138" fill="rgba(255,255,255,0.48)" font-size="14" font-weight="600" letter-spacing="0">new contact</text>
        <line x1="170" y1="114" x2="250" y2="114" stroke="#fb7185" stroke-width="4" stroke-linecap="round" opacity="0.78"/><polyline points="236.49075319196777,122.57322871966394 250,114 236.49075319196777,105.42677128033606" fill="none" stroke="#fb7185" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
        <rect x="250" y="76" width="190" height="76" rx="14" fill="rgba(255,255,255,0.06)" stroke="#fbbf24" stroke-width="2" opacity="0.95"/>
  <text x="270" y="110" fill="rgba(255,255,255,0.86)" font-size="19" font-weight="700" letter-spacing="0">Normalize</text>
  <text x="270" y="138" fill="rgba(255,255,255,0.48)" font-size="14" font-weight="600" letter-spacing="0">email / phone / fields</text>
        <line x1="440" y1="114" x2="520" y2="114" stroke="#fb7185" stroke-width="4" stroke-linecap="round" opacity="0.78"/><polyline points="506.49075319196777,122.57322871966394 520,114 506.49075319196777,105.42677128033606" fill="none" stroke="#fb7185" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
