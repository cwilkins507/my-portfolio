<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="340" fill="#ffffff"/>

  <!-- Prerequisites dashed border -->
  <rect x="18" y="36" width="430" height="280" rx="12"
        fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="10,5"/>
  <rect x="110" y="24" width="146" height="22" rx="4" fill="#ffffff"/>
  <text x="183" y="39" text-anchor="middle"
