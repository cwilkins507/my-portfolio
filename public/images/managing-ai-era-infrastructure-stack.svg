        fill="#6b7280" letter-spacing="1.5" font-weight="600">PREREQUISITES</text>

  <!-- Box 1 — Rules & Instruction Files (blue) -->
  <rect x="38" y="58" width="390" height="75" rx="8" fill="#dbeafe"/>
  <text x="233" y="87" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="16" fill="#1e40af" font-weight="700">Rules &amp; Instruction Files</text>
  <text x="233" y="112" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" fill="#3b82f6">CLAUDE.md · AGENTS.md · system prompts</text>

  <!-- Box 2 — Guardrails (purple) -->
  <rect x="38" y="145" width="390" height="65" rx="8" fill="#ede9fe"/>
  <text x="233" y="173" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="16" fill="#7c3aed" font-weight="700">Guardrails</text>
  <text x="233" y="198" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" fill="#8b5cf6">what good output looks like · scoping docs</text>

  <!-- Box 3 — Brand Context & Content Guidelines (orange) -->
  <rect x="38" y="222" width="390" height="75" rx="8" fill="#ffedd5"/>
  <text x="233" y="252" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="16" fill="#c2410c" font-weight="700">Brand Context &amp; Content Guidelines</text>
  <text x="233" y="277" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" fill="#ea580c">voice · quality standards · team conventions</text>

  <!-- Arrow -->
  <line x1="462" y1="176" x2="528" y2="176" stroke="#374151" stroke-width="3"/>
  <polygon points="528,168 545,176 528,184" fill="#374151"/>

  <!-- Outcome box (green) -->
  <rect x="555" y="68" width="220" height="220" rx="12" fill="#dcfce7"/>
  <rect x="600" y="56" width="132" height="22" rx="4" fill="#ffffff"/>
  <text x="665" y="71" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="12"
        fill="#6b7280" letter-spacing="1.5" font-weight="600">OUTCOME</text>

  <text x="665" y="120" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="18" fill="#15803d" font-weight="700">Consistent</text>
  <text x="665" y="144" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="18" fill="#15803d" font-weight="700">AI Output</text>

  <line x1="590" y1="162" x2="740" y2="162" stroke="#86efac" stroke-width="1.5"/>

  <text x="665" y="195" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="14" fill="#166534">Real productivity</text>
  <text x="665" y="215" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="14" fill="#166534">lift follows</text>

  <text x="665" y="258" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="12" fill="#22c55e" font-style="italic">consistent sprint to sprint</text>
