<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Fira Code',monospace">
  <defs>
    <marker id="ha-arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5263"/>
    </marker>
    <marker id="ha-arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c678dd"/>
    </marker>
    <marker id="ha-arr-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e5c07b"/>
    </marker>
    <marker id="ha-arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#98c379"/>
    </marker>
    <marker id="ha-arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#61afef"/>
    </marker>
    <marker id="ha-arr-loop" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5263"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="#282c34"/>

  <!-- Section labels -->
  <text x="215" y="22" font-size="10" font-weight="700" fill="#636d83" text-anchor="middle" letter-spacing="2">AGENT LOOP</text>
  <text x="630" y="22" font-size="10" font-weight="700" fill="#636d83" text-anchor="middle" letter-spacing="2">HARNESS COMPONENTS</text>

  <!-- Subtle column divider -->
  <line x1="345" y1="32" x2="345" y2="420" stroke="#3e4451" stroke-width="1"/>

  <!-- ===== AGENT LOOP (left column) ===== -->

  <!-- User Request -->
  <rect x="95" y="36" width="240" height="50" fill="#2e3240" rx="3"/>
  <rect x="95" y="36" width="5" height="50" fill="#636d83" rx="2"/>
  <text x="222" y="66" font-size="13" font-weight="500" fill="#abb2bf" text-anchor="middle">User Request</text>

  <line x1="215" y1="86" x2="215" y2="102" stroke="#4b5263" stroke-width="1.5" marker-end="url(#ha-arr-gray)"/>

  <!-- Agent Loop -->
  <rect x="95" y="104" width="240" height="52" fill="#1a2a3a" rx="3" stroke="#61afef" stroke-width="1.5"/>
  <rect x="95" y="104" width="5" height="52" fill="#61afef" rx="2"/>
  <text x="222" y="135" font-size="14" font-weight="700" fill="#61afef" text-anchor="middle">Agent Loop</text>

  <line x1="215" y1="156" x2="215" y2="172" stroke="#4b5263" stroke-width="1.5" marker-end="url(#ha-arr-gray)"/>

  <!-- Model -->
  <rect x="95" y="174" width="240" height="50" fill="#1a2e2e" rx="3"/>
  <rect x="95" y="174" width="5" height="50" fill="#4fc1aa" rx="2"/>
  <text x="222" y="204" font-size="13" font-weight="500" fill="#4fc1aa" text-anchor="middle">Model</text>

  <line x1="215" y1="224" x2="215" y2="240" stroke="#4b5263" stroke-width="1.5" marker-end="url(#ha-arr-gray)"/>

  <!-- Tools -->
  <rect x="95" y="242" width="240" height="50" fill="#2a2600" rx="3"/>
  <rect x="95" y="242" width="5" height="50" fill="#e5c07b" rx="2"/>
  <text x="222" y="272" font-size="13" font-weight="500" fill="#e5c07b" text-anchor="middle">Tools</text>

  <line x1="215" y1="292" x2="215" y2="308" stroke="#4b5263" stroke-width="1.5" marker-end="url(#ha-arr-gray)"/>

  <!-- Observation -->
  <rect x="95" y="310" width="240" height="50" fill="#1a2a1a" rx="3"/>
  <rect x="95" y="310" width="5" height="50" fill="#98c379" rx="2"/>
  <text x="222" y="340" font-size="13" font-weight="500" fill="#98c379" text-anchor="middle">Observation</text>

  <!-- Loop-back arc from Observation to Agent Loop -->
  <path d="M 95 335 L 54 335 L 54 130 L 95 130" fill="none" stroke="#4b5263" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ha-arr-loop)"/>
  <text x="40" y="240" font-size="10" fill="#4b5263" text-anchor="middle" transform="rotate(-90 40 240)">repeats</text>

  <!-- ===== HARNESS COMPONENTS (right column) ===== -->

  <!-- Dashed harness border -->
  <rect x="360" y="28" width="524" height="356" fill="none" stroke="#4b5263" stroke-width="1" stroke-dasharray="5,3" rx="4"/>

  <!-- Instructions (purple) -->
  <rect x="372" y="38" width="500" height="62" fill="#1e1a28" rx="3"/>
  <rect x="372" y="38" width="5" height="62" fill="#c678dd" rx="2"/>
  <text x="502" y="64" font-size="12" font-weight="700" fill="#c678dd">Instructions &amp; Conventions</text>
  <text x="502" y="84" font-size="11" fill="#636d83">CLAUDE.md · AGENTS.md · skills · docs</text>

  <!-- Permissions (yellow) -->
  <rect x="372" y="116" width="500" height="62" fill="#1e1a00" rx="3"/>
  <rect x="372" y="116" width="5" height="62" fill="#e5c07b" rx="2"/>
  <text x="502" y="142" font-size="12" font-weight="700" fill="#e5c07b">Permissions &amp; Tool Scope</text>
  <text x="502" y="162" font-size="11" fill="#636d83">what tools the agent can and cannot use</text>

  <!-- Verification (green) -->
  <rect x="372" y="194" width="500" height="62" fill="#0e1e0e" rx="3"/>
  <rect x="372" y="194" width="5" height="62" fill="#98c379" rx="2"/>
  <text x="502" y="220" font-size="12" font-weight="700" fill="#98c379">Verification</text>
  <text x="502" y="240" font-size="11" fill="#636d83">tests · lint · type check · review pass</text>

  <!-- Memory (blue) -->
  <rect x="372" y="272" width="500" height="62" fill="#0e1a28" rx="3"/>
  <rect x="372" y="272" width="5" height="62" fill="#61afef" rx="2"/>
  <text x="502" y="298" font-size="12" font-weight="700" fill="#61afef">Memory &amp; Handoff Notes</text>
  <text x="502" y="318" font-size="11" fill="#636d83">session recaps · INDEX.md · project memory</text>

  <!-- ===== CONNECTORS (harness → agent loop) ===== -->

  <!-- Instructions (purple) → Agent Loop center y=130 -->
  <path d="M 372 69 L 360 69 L 360 130 L 335 130" fill="none" stroke="#c678dd" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#ha-arr-purple)"/>

  <!-- Permissions (yellow) → Tools center y=267 -->
  <path d="M 372 147 L 348 147 L 348 267 L 335 267" fill="none" stroke="#e5c07b" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#ha-arr-yellow)"/>

  <!-- Verification (green) → Agent Loop center y=130 -->
  <path d="M 372 225 L 356 225 L 356 133 L 335 133" fill="none" stroke="#98c379" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#ha-arr-green)"/>

  <!-- Memory (blue) → Agent Loop center y=130 -->
  <path d="M 372 303 L 352 303 L 352 136 L 335 136" fill="none" stroke="#61afef" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#ha-arr-blue)"/>

  <!-- Caption -->
  <text x="450" y="418" font-size="11" fill="#636d83" text-anchor="middle">the model is one box — the harness is everything else</text>
</svg>
